<!doctype html>
<html lang="zh">
  <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>手写数字识别 - 登录</title>
        <link href="../resource/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="../style.css">
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            main {
                transform: translateY(-25%);
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <main>
            <form>
                <h1 class="h2">登录</h1>
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password">
                </div>
                <button type="submit" class="btn btn-primary">提交</button>
                <a href="./register.html" class="btn btn-link">去注册</a>
            </form>
        </main>
        <script src="../resource/sweetalert2@11.js"></script>
        <script>
                document.querySelector('form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    if (!username || !password) {
                        Swal.fire({
                            title: '错误',
                            text: '用户名和密码不能为空',
                            icon: 'error',
                            confirmButtonText: '确定'
                        });
                        return;
                    }
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });
                    if (response.ok) {
                        Swal.fire({
                            title: '成功',
                            text: '登录成功',
                            icon: 'success',
                            confirmButtonText: '确定'
                        }).then(data => {
                            if (data.isConfirmed) window.location.href = '/';
                        });
                    } else {
                        const data = await response.json();
                        Swal.fire({
                            title: '错误',
                            text: '登录失败: ' + data.message,
                            icon: 'error',
                            confirmButtonText: '确定'
                        });
                    }
                });
        </script>
    </body>
</html>
