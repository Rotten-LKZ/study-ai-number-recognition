<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手写数字识别 - 历史记录</title>
    <link href="../resource/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .history-img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #dee2e6;
            cursor: pointer;
        }
        .result-badge {
            display: inline-block;
            padding: 0.25em 0.6em;
            border-radius: 0.25rem;
            font-size: 0.875em;
            font-weight: 500;
        }
        .result-badge.best {
            background: #198754;
            color: #fff;
        }
        .result-badge.normal {
            background: #e9ecef;
            color: #495057;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #6c757d;
        }
        .pixelated-img {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">手写数字识别</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="/about">关于</a>
                <a class="nav-link" href="/">去识别</a>
                <a class="nav-link" href="/auth/login" id="loginLink">登录 / 注册</a>
                <div class="nav-item position-relative" id="userMenu" style="display:none;">
                    <a class="nav-link" href="#" id="userNameLink">用户</a>
                    <div class="position-absolute end-0 bg-white border rounded shadow-sm py-1" style="top:100%; display:none; min-width: 100px; z-index: 1000;" id="logoutMenu">
                        <a class="dropdown-item px-3 py-1 text-decoration-none text-dark" href="#" id="logoutBtn">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <style>
        #userMenu:hover #logoutMenu { display: block !important; }
    </style>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title mb-4">识别历史</h2>
                        <div id="loading">
                            <div class="d-flex justify-content-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                            </div>
                        </div>
                        <div id="content" class="d-none">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th style="width: 80px;">图片</th>
                                            <th>识别结果</th>
                                            <th style="width: 180px;">时间</th>
                                        </tr>
                                    </thead>
                                    <tbody id="historyBody"></tbody>
                                </table>
                            </div>
                            <div id="emptyState" class="empty-state d-none">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-inbox mb-3" viewBox="0 0 16 16">
                                    <path d="M4.98 4a.5.5 0 0 0-.39.188L1.54 8H6a.5.5 0 0 1 .5.5 1.5 1.5 0 1 0 3 0A.5.5 0 0 1 10 8h4.46l-3.05-3.812A.5.5 0 0 0 11.02 4zm9.954 5H10.45a2.5 2.5 0 0 1-4.9 0H1.066l.32 2.562a.5.5 0 0 0 .497.438h12.234a.5.5 0 0 0 .496-.438L14.933 9zM3.809 3.563A1.5 1.5 0 0 1 4.981 3h6.038a1.5 1.5 0 0 1 1.172.563l3.137 3.922A1.5 1.5 0 0 1 15 8.5V13a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8.5a1.5 1.5 0 0 1 .53-1.415z"/>
                                </svg>
                                <p>暂无识别记录，快去试试吧！</p>
                                <a href="/" class="btn btn-primary btn-sm">去识别</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../resource/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../resource/sweetalert2@11.js"></script>
    <script>
        async function checkAuth() {
            try {
                const resp = await fetch('/api/me');
                if (resp.status === 401) {
                    window.location.href = '/auth/login';
                    return;
                }
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('userMenu').style.display = 'block';
                document.getElementById('userNameLink').textContent = data.username;
            } catch (e) {
                window.location.href = '/auth/login';
            }
        }
        checkAuth();

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/auth/login';
        });

        function parseResults(results) {
            if (!results) return [];
            let raw;
            if (typeof results === 'string') {
                raw = results;
            } else if (Array.isArray(results)) {
                if (results.length > 0 && typeof results[0] === 'string' && results[0].length === 1) {
                    raw = results.join('');
                } else {
                    return results;
                }
            } else {
                return [];
            }
            try {
                const jsonLike = raw.replace(/\(/g, '[').replace(/\)/g, ']');
                return JSON.parse(jsonLike);
            } catch (e) {
                return [];
            }
        }

        function formatDate(dtStr) {
            if (!dtStr) return '-';
            const d = new Date(dtStr);
            if (isNaN(d.getTime())) return dtStr;
            const pad = n => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/recognition_history');

                if (response.status === 401) {
                    Swal.fire({
                        title: '未登录',
                        text: '请先登录后查看历史记录',
                        icon: 'warning',
                        confirmButtonText: '去登录'
                    }).then(() => {
                        window.location.href = '/auth/login';
                    });
                    return;
                }

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || '加载失败');
                }

                const data = await response.json();
                const history = data.history || [];

                document.getElementById('loading').classList.add('d-none');
                document.getElementById('content').classList.remove('d-none');

                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';

                if (history.length === 0) {
                    document.getElementById('emptyState').classList.remove('d-none');
                    return;
                }

                document.getElementById('emptyState').classList.add('d-none');

                history.reverse().forEach(item => {
                    const results = parseResults(item.results);
                    const resultHtml = results.map(([digit, prob], idx) => {
                        const pct = Math.round((prob || 0) * 100);
                        return `<span class="result-badge ${idx === 0 ? 'best' : 'normal'} me-1" title="概率: ${(prob || 0).toFixed(4)}">${digit} (${pct}%)</span>`;
                    }).join('');

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <img class="history-img"
                                 src="/api/images/${encodeURIComponent(item.image_filename)}"
                                 alt="手写数字"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';"
                                 onclick="showImage('${item.image_filename}')">
                            <div style="display:none; width:56px; height:56px; border-radius:4px; border:1px solid #dee2e6; background:#f8f9fa; align-items:center; justify-content:center;" class="text-muted">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-image" viewBox="0 0 16 16">
                                    <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                                    <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1z"/>
                                </svg>
                            </div>
                        </td>
                        <td>${resultHtml || '-'}</td>
                        <td class="text-muted">${formatDate(item.created_at)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('loading').classList.add('d-none');
                Swal.fire({ title: '错误', text: err.message, icon: 'error', confirmButtonText: '确定' });
            }
        }

        function showImage(filename) {
            Swal.fire({
                title: '手写数字',
                imageUrl: `/api/images/${encodeURIComponent(filename)}`,
                imageAlt: '手写数字',
                imageWidth: 224,
                imageHeight: 224,
                customClass: { image: 'pixelated-img' },
                confirmButtonText: '关闭'
            });
        }

        loadHistory();
    </script>
</body>
</html>
