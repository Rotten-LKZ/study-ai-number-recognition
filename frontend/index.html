<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手写数字识别</title>
    <link href="./resource/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        canvas {
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: auto;
            background: #fff;
            touch-action: none;
        }
        .result-bar {
            height: 24px;
            border-radius: 4px;
            background: #0d6efd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            min-width: 40px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">手写数字识别</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="/auth/me">历史记录</a>
                <a class="nav-link" href="/auth/login" id="loginLink">登录 / 注册</a>
                <div class="nav-item position-relative" id="userMenu" style="display:none;">
                    <a class="nav-link" href="#" id="userNameLink">用户</a>
                    <div class="position-absolute end-0 bg-white border rounded shadow-sm py-1" style="top:100%; display:none; min-width: 100px; z-index: 1000;" id="logoutMenu">
                        <a class="dropdown-item px-3 py-1 text-decoration-none text-dark" href="#" id="logoutBtn">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <style>
        #userMenu:hover #logoutMenu { display: block !important; }
    </style>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">在画布上写一个数字</h2>
                        <div class="canvas-container mb-3">
                            <canvas id="drawCanvas" width="400" height="400"></canvas>
                        </div>
                        <div class="d-flex justify-content-center gap-2 mb-4">
                            <button id="clearBtn" class="btn btn-outline-secondary">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eraser me-1" viewBox="0 0 16 16">
                                    <path d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828zm.66 11.34L3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293z"/>
                                </svg>
                                清除
                            </button>
                            <button id="recognizeBtn" class="btn btn-primary">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-magic me-1" viewBox="0 0 16 16">
                                    <path d="M9.5 2.672a.5.5 0 1 0 1 0V.843a.5.5 0 0 0-1 0zm-2.5.5a.5.5 0 0 0-1 0V1.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V2.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V3.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V4.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V5.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V6.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V7.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V8.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V9.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V10.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V11.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V12.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V13.5a.5.5 0 0 0 1 0z"/>
                                    <path d="M13.879 3.879a1.5 1.5 0 0 1 2.122 2.122l-7.5 7.5a1.5 1.5 0 0 1-2.122 0l-3.5-3.5a1.5 1.5 0 0 1 2.122-2.122l2.439 2.44 6.439-6.44z"/>
                                </svg>
                                识别
                            </button>
                        </div>

                        <div id="resultArea" class="d-none">
                            <hr>
                            <h5 class="text-center mb-3">识别结果</h5>
                            <div id="resultList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./resource/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./resource/sweetalert2@11.js"></script>
    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // 初始化画布
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.lineWidth = 15;
        ctx.strokeStyle = '#000000';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('resultArea').classList.add('d-none');
        });

        async function checkAuth() {
            try {
                const resp = await fetch('/api/me');
                if (resp.status === 401) {
                    window.location.href = '/auth/login';
                    return;
                }
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('userMenu').style.display = 'block';
                document.getElementById('userNameLink').textContent = data.username;
            } catch (e) {
                window.location.href = '/auth/login';
            }
        }
        checkAuth();

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/auth/login';
        });

        document.getElementById('recognizeBtn').addEventListener('click', async () => {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            let hasContent = false;
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i] < 255 || pixels[i+1] < 255 || pixels[i+2] < 255) {
                    hasContent = true;
                    break;
                }
            }
            if (!hasContent) {
                Swal.fire({ title: '提示', text: '请先写一个数字', icon: 'warning', confirmButtonText: '确定' });
                return;
            }

            const base64 = canvas.toDataURL('image/png');
            const btn = document.getElementById('recognizeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>识别中...';

            try {
                const response = await fetch('/api/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });

                if (response.status === 401) {
                    Swal.fire({
                        title: '未登录',
                        text: '请先登录后再进行识别',
                        icon: 'warning',
                        confirmButtonText: '去登录'
                    }).then(() => {
                        window.location.href = '/auth/login';
                    });
                    return;
                }

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || '识别失败');
                }

                const data = await response.json();
                const results = data.result || [];
                const list = document.getElementById('resultList');
                list.innerHTML = '';

                results.forEach(([digit, prob], idx) => {
                    const percent = Math.round(prob * 100);
                    const row = document.createElement('div');
                    row.className = 'd-flex align-items-center mb-2';
                    row.innerHTML = `
                        <div class="me-2 fw-bold" style="min-width: 24px;">${digit}</div>
                        <div class="flex-grow-1 me-2">
                            <div class="progress" style="height: 24px;">
                                <div class="progress-bar ${idx === 0 ? 'bg-success' : 'bg-primary'}" role="progressbar" style="width: ${percent}%;" aria-valuenow="${percent}" aria-valuemin="0" aria-valuemax="100">${percent}%</div>
                            </div>
                        </div>
                        <div class="text-muted" style="min-width: 60px; text-align: right;">${prob.toFixed(4)}</div>
                    `;
                    list.appendChild(row);
                });

                document.getElementById('resultArea').classList.remove('d-none');
            } catch (err) {
                Swal.fire({ title: '错误', text: err.message, icon: 'error', confirmButtonText: '确定' });
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-magic me-1" viewBox="0 0 16 16">
                        <path d="M9.5 2.672a.5.5 0 1 0 1 0V.843a.5.5 0 0 0-1 0zm-2.5.5a.5.5 0 0 0-1 0V1.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V2.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V3.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V4.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V5.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V6.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V7.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V8.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V9.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V10.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V11.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V12.5a.5.5 0 0 0 1 0zm-2 .5a.5.5 0 0 0-1 0V13.5a.5.5 0 0 0 1 0z"/>
                        <path d="M13.879 3.879a1.5 1.5 0 0 1 2.122 2.122l-7.5 7.5a1.5 1.5 0 0 1-2.122 0l-3.5-3.5a1.5 1.5 0 0 1 2.122-2.122l2.439 2.44 6.439-6.44z"/>
                    </svg>
                    识别
                `;
            }
        });
    </script>
</body>
</html>
